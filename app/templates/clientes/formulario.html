{% extends 'base.html' %}{% block title %}{{ 'Editar' if cliente else 'Nuevo' }} cliente · ARQUEOB{% endblock %}{% block content %}
<div class="page-heading"><a href="{{ url_for('clientes.listado') }}" class="text-decoration-none small"><i class="bi bi-arrow-left"></i> Volver a clientes</a><h1 class="h3 mt-2">{{ 'Editar cliente' if cliente else 'Nuevo cliente' }}</h1></div>
<form method="post" class="card border-0 shadow-sm form-card"><div class="card-body p-3 p-md-4"><div class="row g-3"><div class="col-md-6"><label class="form-label">Nombre *</label><input required class="form-control" name="nombre" value="{{ cliente.nombre if cliente else '' }}"></div><div class="col-md-6"><label class="form-label">Teléfono *</label><input required class="form-control" name="telefono" value="{{ cliente.telefono if cliente else '' }}"></div><div class="col-md-6"><label class="form-label">RNC o cédula</label><input class="form-control" name="rnc_cedula" value="{{ cliente.rnc_cedula if cliente and cliente.rnc_cedula else '' }}"></div><div class="col-md-6"><label class="form-label">Dirección *</label><input required class="form-control" name="direccion" value="{{ cliente.direccion if cliente else '' }}"></div><div class="col-12"><label class="form-label">Observaciones</label><textarea class="form-control" name="observaciones" rows="3">{{ cliente.observaciones if cliente and cliente.observaciones else '' }}</textarea></div></div></div><div class="card-footer bg-white border-0 p-3 p-md-4 pt-0"><button class="btn btn-primary btn-lg"><i class="bi bi-check-lg"></i> Guardar cliente</button><a class="btn btn-light btn-lg" href="{{ url_for('clientes.listado') }}">Cancelar</a></div></form>
{% endblock %}
