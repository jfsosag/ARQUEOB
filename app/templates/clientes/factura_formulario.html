{% extends 'base.html' %}{% block title %}Editar factura · ARQUEOB{% endblock %}{% block content %}
<div class="page-heading"><a href="{{ url_for('clientes.detalle', cliente_id=cliente.id) }}" class="text-decoration-none small"><i class="bi bi-arrow-left"></i> Volver a {{ cliente.nombre }}</a><h1 class="h3 mt-2">Editar factura #{{ factura.numero }}</h1></div>
<form method="post" class="card border-0 shadow-sm form-card"><div class="card-body p-3 p-md-4"><div class="row g-3"><div class="col-md-4"><label class="form-label">Número de factura *</label><input required class="form-control" name="numero" value="{{ factura.numero }}"></div><div class="col-md-4"><label class="form-label">Fecha *</label><input required class="form-control" name="fecha" type="date" value="{{ factura.fecha.isoformat() }}"></div><div class="col-md-4"><label class="form-label">Monto *</label><input required class="form-control" name="monto" type="number" min="0.01" step="0.01" value="{{ factura.monto }}"></div><div class="col-12"><label class="form-label">Concepto *</label><input required class="form-control" name="concepto" value="{{ factura.concepto }}"></div></div></div><div class="card-footer bg-white border-0 p-3 p-md-4 pt-0"><button class="btn btn-primary btn-lg"><i class="bi bi-check-lg"></i> Guardar cambios</button><a class="btn btn-light btn-lg" href="{{ url_for('clientes.detalle', cliente_id=cliente.id) }}">Cancelar</a></div></form>
{% endblock %}
