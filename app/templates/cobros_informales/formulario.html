{% extends 'base.html' %}{% block title %}Nuevo cobro informal · ARQUEOB{% endblock %}{% block content %}
<div class="page-heading mb-4"><h1 class="h3">Nuevo cobro informal</h1><p class="text-secondary">Registra un cobro sin factura en una sola operación.</p></div>
<form method="post" class="row g-3 ci-form" id="cobro-informal-form">

  <div class="col-lg-4">
    <section class="card border-0 shadow-sm"><div class="card-body p-3 p-lg-4">
      <h2 class="h5 mb-3">Cliente</h2>
      <label class="form-label fw-semibold">Buscar cliente</label>
      <input class="form-control form-control-lg" id="client-search" placeholder="Nombre, teléfono o RNC" autocomplete="off">
      <div id="client-results" class="list-group mt-2"></div>
      <input type="hidden" name="cliente_id" id="cliente-id">
      <div id="selected-client-display" class="selected-client mt-3" style="display:none"></div>
      <div class="mt-2"><button type="button" class="btn btn-sm btn-outline-primary" data-bs-toggle="modal" data-bs-target="#newClientModal"><i class="bi bi-person-plus"></i> Nuevo cliente</button></div>
    </div></section>
  </div>

  <div class="col-lg-8">
    <section class="card border-0 shadow-sm"><div class="card-body p-3 p-lg-4">
      <h2 class="h5 mb-3">Información del cobro</h2>
      <div class="row g-3">
        <div class="col-md-8"><label class="form-label">Concepto *</label><select required class="form-select" name="concepto" id="concepto-select"><option value="">Seleccionar...</option><option>Reparación</option><option>Venta de repuestos</option><option>Mano de obra</option><option>Servicio mecánico</option><option>Préstamo</option><option>Otro</option></select><input class="form-control mt-2" id="concepto-otro" name="concepto_otro" placeholder="Escriba el concepto" style="display:none"></div>
        <div class="col-md-4"><label class="form-label">Total adeudado *</label><input required class="form-control" name="monto_total" type="number" min="0.01" step="0.01" id="monto-total"></div>
        <div class="col-md-4"><label class="form-label">Monto que paga *</label><input required class="form-control" name="monto_pagado" type="number" min="0.01" step="0.01" id="monto-pagado"></div>
        <div class="col-md-4"><label class="form-label">Saldo pendiente</label><input class="form-control" id="saldo-pendiente" readonly value="RD$ 0.00"></div>
        <div class="col-md-4"><label class="form-label">Forma de pago *</label><select required class="form-select" name="forma_pago" id="forma-pago"><option>Efectivo</option><option>Cheque</option><option>Transferencia</option><option>Tarjeta</option></select></div>
      </div>

      <div id="cheque-fields" class="mt-3" style="display:none"><hr><div class="row g-3"><div class="col-md-6"><label class="form-label">Banco *</label><input class="form-control" name="banco"></div><div class="col-md-6"><label class="form-label">Número de cheque *</label><input class="form-control" name="numero"></div></div></div>

      <div id="transferencia-fields" class="mt-3" style="display:none"><hr><div class="row g-3"><div class="col-md-6"><label class="form-label">Banco *</label><input class="form-control" name="banco"></div><div class="col-md-6"><label class="form-label">Núm. de referencia *</label><input class="form-control" name="numero"></div></div></div>

      <div class="mt-3"><label class="form-label">Observaciones</label><textarea class="form-control" name="observaciones" rows="2"></textarea></div>
    </div><div class="card-footer bg-white border-0 p-3 p-lg-4 pt-0"><button class="btn btn-primary btn-lg"><i class="bi bi-check-circle"></i> Guardar cobro informal</button><a class="btn btn-light btn-lg" href="{{ url_for('cobros_informales.historial') }}">Cancelar</a></div></section>
  </div>
</form>

<div class="modal fade" id="newClientModal" tabindex="-1"><div class="modal-dialog"><div class="modal-content">
  <div class="modal-header"><h5 class="modal-title">Nuevo cliente</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
  <div class="modal-body">
    <form id="new-client-form">
      <div class="mb-3"><label class="form-label">Nombre *</label><input required class="form-control" name="nombre" id="nc-nombre"></div>
      <div class="mb-3"><label class="form-label">Teléfono</label><input class="form-control" name="telefono" id="nc-telefono"></div>
      <div class="mb-3"><label class="form-label">Dirección</label><input class="form-control" name="direccion" id="nc-direccion"></div>
      <div class="mb-3"><label class="form-label">RNC o cédula</label><input class="form-control" name="rnc_cedula" id="nc-rnc"></div>
    </form>
  </div>
  <div class="modal-footer"><button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button><button type="button" class="btn btn-primary" id="save-client-btn">Guardar y seleccionar</button></div>
</div></div></div>
{% endblock %}
