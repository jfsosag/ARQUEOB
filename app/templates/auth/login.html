<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Iniciar sesión · ARQUEOB</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <style>
    body{background:#f4f6fb;display:grid;place-items:center;min-height:100vh;margin:0;font-family:system-ui,-apple-system,"Segoe UI",sans-serif}
    .login-card{max-width:400px;width:100%;border-radius:1rem;box-shadow:0 8px 32px rgba(28,39,69,.1)}
    .login-brand{background:linear-gradient(120deg,#172554,#334fa9);color:#fff;border-radius:1rem 1rem 0 0;padding:2rem;text-align:center}
    .login-brand i{font-size:2.5rem}
    .form-control{border-radius:.6rem;min-height:2.8rem}
    .btn-primary{border-radius:.6rem}
  </style>
</head>
<body>
  <div class="login-card card border-0 shadow">
    <div class="login-brand">
      <i class="bi bi-cash-stack"></i>
      <h1 class="h4 mt-2 mb-0 fw-bold">ARQUEOB</h1>
      <small class="opacity-75">Sistema de cuentas por cobrar</small>
    </div>
    <div class="card-body p-4">
      {% with messages = get_flashed_messages(with_categories=true) %}{% if messages %}{% for category, message in messages %}<div class="alert alert-{{ category }} py-2 small" role="alert">{{ message }}</div>{% endfor %}{% endif %}{% endwith %}
      <form method="post">
        <div class="mb-3">
          <label class="form-label fw-semibold">Usuario</label>
          <div class="input-group"><span class="input-group-text"><i class="bi bi-person"></i></span><input class="form-control" name="username" required autofocus autocomplete="username"></div>
        </div>
        <div class="mb-4">
          <label class="form-label fw-semibold">Contraseña</label>
          <div class="input-group"><span class="input-group-text"><i class="bi bi-lock"></i></span><input class="form-control" name="password" type="password" required autocomplete="current-password"></div>
        </div>
        <button class="btn btn-primary btn-lg w-100" type="submit"><i class="bi bi-box-arrow-in-right me-1"></i> Iniciar sesión</button>
      </form>
    </div>
  </div>
</body>
</html>
